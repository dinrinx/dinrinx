name: Generate Metrics

on:
  schedule:
    - cron: "0 0 * * *" # раз в сутки
  workflow_dispatch: {} # ручной запуск из вкладки Actions
  push:
    branches:
      - main

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: github-metrics.svg
          template: classic
          base: header
          plugin_languages: yes
          plugin_languages_limit: 6
          plugin_languages_analysis_timeout: 15
          extras_css: |
            :root { --color-canvas-default: #1a1a1a !important; }
            body { background-color: #1a1a1a !important; }
            h2.field, h3.field { color: #B08968 !important; }
            div.field, p.field, span.field { color: #e6dcd3 !important; }
